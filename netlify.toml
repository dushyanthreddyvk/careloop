[build]
  command = "npm run build"
  publish = "dist"
  node_version = "18.19.0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_URL = "https://careloop-backend.onrender.com"

[context.deploy-preview.environment]
  VITE_API_URL = "https://careloop-backend.onrender.com"
